# ========================================
# AI Interview Assistant - Configuration
# ========================================

# Server
server.port=8081

# H2 Database (Local Development)
spring.datasource.url=jdbc:h2:mem:ai_interview;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.defer-datasource-initialization=true

# Initialize data (H2 compatible)
spring.sql.init.mode=always
spring.sql.init.data-locations=classpath:data-h2.sql

# Cache (Caffeine)
spring.cache.type=caffeine
spring.cache.caffeine.spec=maximumSize=500,expireAfterWrite=10m

# Logging
logging.level.com.aiinterview=INFO
logging.level.org.springframework.web.socket=DEBUG

# CORS
app.cors.origins=http://localhost:5173,http://localhost:3000,http://127.0.0.1:5173,http://localhost:8081

# AI Service (placeholder - replace with real API key)
app.ai.api-key=${AI_API_KEY:}
app.ai.api-url=${AI_API_URL:https://api.openai.com/v1/chat/completions}
